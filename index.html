<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechCore | Gadget Store</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="main-header">
    <div class="logo">Tech<span>Core</span></div>

    <nav class="header-actions">
        <button class="btn-login">Login</button>

        <div class="cart-wrapper">
            <button class="btn-cart">🛒 Cart</button>
            <span class="badge">2</span>
        </div>
    </nav>
</header>

<section class="hero">
    <div class="hero-content">
        <h1>Upgrade Your Tech Game</h1>
        <p>Latest gadgets. Smart living.</p>
        <button class="btn-cta">Shop Now</button>
    </div>
</section>

<nav class="filter-section">
    <button class="pill active">All</button>
    <button class="pill">Smartphones</button>
    <button class="pill">Accessories</button>
    <button class="pill">Wearables</button>
</nav>

<main class="product-grid">

    <article class="card sale">
        <div class="card-img">
            <img src="phone.jpg" alt="Smartphone">
        </div>

        <div class="card-info">
            <h3>Flagship Smartphone</h3>
            <p class="meta">128GB • AMOLED Display</p>
            <div class="price">$799 <span class="old-price">$999</span></div>
            <button class="btn-add">Add to Cart</button>
        </div>
    </article>

    <article class="card">
        <div class="card-img">
            <img src="headphones.jpg" alt="Wireless Headphones">
        </div>

        <div class="card-info">
            <h3>Wireless Headphones</h3>
            <p class="meta">Noise Cancelling</p>
            <div class="price">$199</div>
            <button class="btn-add">Add to Cart</button>
        </div>
    </article>

    <article class="card low-stock">
        <div class="card-img">
            <img src="smartwatch.jpg" alt="Smartwatch">
        </div>

        <div class="card-info">
            <h3>Smart Watch</h3>
            <p class="meta">Fitness & Health Tracking</p>
            <div class="price">$149</div>
            <button class="btn-add">Add to Cart</button>
        </div>
    </article>

    <article class="card">
        <div class="card-img">
            <img src="keyboard.jpg" alt="Mechanical Keyboard">
        </div>

        <div class="card-info">
            <h3>Mechanical Keyboard</h3>
            <p class="meta">RGB Backlit</p>
            <div class="price">$120</div>
            <button class="btn-add btn--added">Added to Cart</button>
        </div>
    </article>

</main>

</body>
</html>
